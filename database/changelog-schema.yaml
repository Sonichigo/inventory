# ── changelog-schema.yaml ─────────────────────────────────────────────────────
# Baseline schema — creates all tables.
# Runs once. Never truncates or seeds data.
# Apply: liquibase --changeLogFile=liquibase/changelog-schema.yaml update

databaseChangeLog:

  - changeSet:
      id: 1-create-locations
      author: bbqbookkeeper
      runOnChange: false
      changes:
        - createTable:
            tableName: locations
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: TEXT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: city
                  type: TEXT
                  constraints:
                    nullable: false

  - changeSet:
      id: 2-create-inventory
      author: bbqbookkeeper
      runOnChange: false
      changes:
        - createTable:
            tableName: inventory
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: unit
                  type: TEXT
                  defaultValue: lbs
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: TEXT
                  constraints:
                    nullable: false
                    references: locations(name)
                    foreignKeyName: fk_inventory_location

  - changeSet:
      id: 3-create-suppliers
      author: bbqbookkeeper
      runOnChange: false
      changes:
        - createTable:
            tableName: suppliers
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: item
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: lead_days
                  type: INTEGER
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false

  - changeSet:
      id: 4-seed-locations
      author: bbqbookkeeper
      runOnChange: false
      changes:
        - sql:
            sql: |
              INSERT INTO locations (name, city) VALUES
                ('Seattle','Seattle'),('Portland','Portland'),
                ('San Francisco','San Francisco'),('Austin','Austin'),
                ('Nashville','Nashville'),('Chicago','Chicago'),
                ('Dallas','Dallas'),('Miami','Miami'),
                ('Denver','Denver'),('Phoenix','Phoenix')
              ON CONFLICT (name) DO NOTHING;