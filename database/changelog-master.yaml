# ── changelog-master.yaml ─────────────────────────────────────────────────────
# Single master changelog for BBQBookkeeper DBMarlin demo.
#
# Context tags:
#   "bad or good"  → runs in BOTH states (schema, truncate, locations)
#   "bad"          → runs only in bad state (drop indexes, bulk data)
#   "good"         → runs only in good state (add indexes, bulk data)
#
# Harness DB Instance context:
#   Bad pipeline  → context: bad
#   Good pipeline → context: good
#
# IMPORTANT: Every changeSet has an explicit context tag.
# Harness skips changesets with no context when a context filter is applied.
#
# DESIGN DECISIONS:
#   - Schema uses CREATE TABLE IF NOT EXISTS → idempotent, safe on any DB state
#   - validCheckSum: ANY → schema SQL changes never cause checksum failures
#   - Truncate split into 3 changesets with individual preConditions → each
#     table checked independently, no DO $$ blocks (Liquibase parses $$ as param)
#   - Locations use ON CONFLICT DO NOTHING → safe if truncate was skipped
#   - state-3 drop constraints uses IF EXISTS → safe on fresh tables
#   - bad/good seed changesets have no FK guard needed because state-2 always
#     seeds locations first with ON CONFLICT DO NOTHING

databaseChangeLog:

  # ── Schema ───────────────────────────────────────────────────────────────────
  # CREATE TABLE IF NOT EXISTS is idempotent — safe on fresh and existing DBs.
  # validCheckSum: ANY means future SQL edits never cause checksum failures.

  - changeSet:
      id: schema-1-create-locations
      author: bbqbookkeeper
      context: "bad or good"
      runOnChange: false
      validCheckSum: ANY
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS locations (
                id   SERIAL PRIMARY KEY,
                name TEXT NOT NULL UNIQUE,
                city TEXT NOT NULL
              );

  - changeSet:
      id: schema-2-create-inventory
      author: bbqbookkeeper
      context: "bad or good"
      runOnChange: false
      validCheckSum: ANY
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS inventory (
                id       SERIAL PRIMARY KEY,
                name     TEXT    NOT NULL,
                quantity INTEGER NOT NULL DEFAULT 0,
                unit     TEXT    NOT NULL DEFAULT 'lbs',
                location TEXT    NOT NULL REFERENCES locations(name) ON UPDATE CASCADE
              );

  - changeSet:
      id: schema-3-create-suppliers
      author: bbqbookkeeper
      context: "bad or good"
      runOnChange: false
      validCheckSum: ANY
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS suppliers (
                id        SERIAL PRIMARY KEY,
                name      TEXT    NOT NULL,
                location  TEXT    NOT NULL,
                item      TEXT    NOT NULL,
                lead_days INTEGER NOT NULL DEFAULT 1
              );

  # ── Truncate ─────────────────────────────────────────────────────────────────
  # Split into 3 separate changesets — each with its own preCondition.
  # Avoids DO $$ blocks which Liquibase misparses as parameter placeholders.
  # Order: inventory first (has FK to locations), then suppliers, then locations.

  - changeSet:
      id: state-1a-truncate-inventory
      author: bbqbookkeeper
      context: "bad or good"
      runAlways: true
      preConditions:
        - onFail: MARK_RAN
          tableExists:
            tableName: inventory
      changes:
        - sql:
            sql: TRUNCATE TABLE inventory;

  - changeSet:
      id: state-1b-truncate-suppliers
      author: bbqbookkeeper
      context: "bad or good"
      runAlways: true
      preConditions:
        - onFail: MARK_RAN
          tableExists:
            tableName: suppliers
      changes:
        - sql:
            sql: TRUNCATE TABLE suppliers;

  - changeSet:
      id: state-1c-truncate-locations
      author: bbqbookkeeper
      context: "bad or good"
      runAlways: true
      preConditions:
        - onFail: MARK_RAN
          tableExists:
            tableName: locations
      changes:
        - sql:
            sql: TRUNCATE TABLE locations CASCADE;

  # ── Reseed locations ─────────────────────────────────────────────────────────
  # ON CONFLICT DO NOTHING: safe if truncate was skipped (MARK_RAN)
  # and locations already have data.

  - changeSet:
      id: state-2-reseed-locations
      author: bbqbookkeeper
      context: "bad or good"
      runAlways: true
      changes:
        - sql:
            sql: |
              INSERT INTO locations (name, city) VALUES
                ('Seattle','Seattle'),
                ('Portland','Portland'),
                ('San Francisco','San Francisco'),
                ('Austin','Austin'),
                ('Nashville','Nashville'),
                ('Chicago','Chicago'),
                ('Dallas','Dallas'),
                ('Miami','Miami'),
                ('Denver','Denver'),
                ('Phoenix','Phoenix')
              ON CONFLICT (name) DO NOTHING;

  # ── Drop constraints ─────────────────────────────────────────────────────────
  # IF EXISTS makes this safe on fresh tables with no constraints yet.

  - changeSet:
      id: state-3-drop-constraints
      author: bbqbookkeeper
      context: "bad or good"
      runAlways: true
      preConditions:
        - onFail: MARK_RAN
          tableExists:
            tableName: inventory
      changes:
        - sql:
            sql: |
              ALTER TABLE inventory DROP CONSTRAINT IF EXISTS inventory_name_location_key;
              ALTER TABLE suppliers DROP CONSTRAINT IF EXISTS suppliers_name_location_key;

  # ── BAD state ────────────────────────────────────────────────────────────────

  - changeSet:
      id: bad-1-drop-indexes
      author: bbqbookkeeper
      context: "bad"
      runAlways: true
      comment: "BAD: drop all functional indexes — forces sequential scans on LOWER() join columns"
      changes:
        - sql:
            sql: |
              DROP INDEX IF EXISTS idx_inventory_location_lower;
              DROP INDEX IF EXISTS idx_suppliers_location_lower;
              DROP INDEX IF EXISTS idx_suppliers_item_lower;

  - changeSet:
      id: bad-2-seed-inventory
      author: bbqbookkeeper
      context: "bad"
      runAlways: true
      changes:
        - sql:
