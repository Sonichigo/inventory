  # ── GOOD state — add functional indexes (the fix) ───────────────────────────

  - changeSet:
      id: good-1-create-indexes
      author: bbqbookkeeper
      context: "good"
      runAlways: true
      comment: "THE FIX: functional indexes on all LOWER() join columns"
      changes:
        - sql:
            sql: |
              DROP INDEX IF EXISTS idx_inventory_location_lower;
              DROP INDEX IF EXISTS idx_suppliers_location_lower;
              DROP INDEX IF EXISTS idx_suppliers_item_lower;

              CREATE INDEX idx_inventory_location_lower
                  ON inventory (LOWER(location));
              CREATE INDEX idx_suppliers_location_lower
                  ON suppliers (LOWER(location));
              CREATE INDEX idx_suppliers_item_lower
                  ON suppliers (LOWER(item));

