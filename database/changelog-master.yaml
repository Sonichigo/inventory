  # ════════════════════════════════════════════════════════════════════════════
  # GOOD STATE
  # Fix #6: preCondition checks tables exist before creating indexes
  # Visual difference: indexes added, slow view dropped, same 200k/100k rows
  # The contrast in DBMarlin is purely from index scans replacing seq scans
  # ════════════════════════════════════════════════════════════════════════════

  - changeSet:
      id: good-1-create-indexes
      author: bbqbookkeeper
      context: "good"
      runAlways: true
      comment: "THE FIX: functional indexes on all LOWER() join columns"
      preConditions:
        - onFail: MARK_RAN
          and:
            - tableExists:
                tableName: inventory
            - tableExists:
                tableName: suppliers
      changes:
        - sql:
            sql: |
              -- Remove slow view from bad state if exists
              DROP VIEW IF EXISTS inventory_scan;

              -- Drop and recreate all functional indexes cleanly
              DROP INDEX IF EXISTS idx_inventory_location_lower;
              DROP INDEX IF EXISTS idx_suppliers_location_lower;
              DROP INDEX IF EXISTS idx_suppliers_item_lower;

              CREATE INDEX idx_inventory_location_lower
                  ON inventory (LOWER(location));
              CREATE INDEX idx_suppliers_location_lower
                  ON suppliers (LOWER(location));
              CREATE INDEX idx_suppliers_item_lower
                  ON suppliers (LOWER(item));

              -- Also remove any leftover sleep trigger from bad state
              DROP TRIGGER IF EXISTS trg_inventory_scan_cost ON inventory;
              DROP FUNCTION IF EXISTS fn_inventory_scan_cost();

