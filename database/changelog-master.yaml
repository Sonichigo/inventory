      context: "bad"
      runAlways: true
      comment: "200,000 random rows — 4x larger dataset amplifies sequential scan cost"
      changes:
        - sql:
            sql: |
              INSERT INTO inventory (name, quantity, unit, location)
              SELECT
                (ARRAY['Brisket','Pulled Pork','Chicken Wings','Beef Ribs','Sausage Links',
                       'Smoked Turkey','Burnt Ends','Pork Belly','Hot Chicken','Jalapeño Sausage'])
                    [floor(random()*10+1)],
                floor(random()*100+1)::int,
                (ARRAY['lbs','racks','links','pieces'])
                    [floor(random()*4+1)],
                (ARRAY['Seattle','Portland','Austin','Nashville','San Francisco',
                       'Chicago','Dallas','Miami','Denver','Phoenix'])
                    [floor(random()*10+1)]
              FROM generate_series(1, 200000);

  - changeSet:
      id: bad-4-drop-trigger-after-insert
      author: bbqbookkeeper
      context: "bad"
      runAlways: true
      comment: "Drop INSERT trigger — we only want it on SELECT path via query cost"
      changes:
        - sql:
            sql: |
              -- Drop the INSERT trigger now that seeding is done
              -- Re-create as a STATEMENT-level trigger on the SELECT side
              -- by using a view that adds sleep to simulate scan cost
              DROP TRIGGER IF EXISTS trg_inventory_scan_cost ON inventory;
              DROP FUNCTION IF EXISTS fn_inventory_scan_cost();

              -- Create a pg_sleep-based function used by the hot query via wrapper
              -- This gets called by the application via a deliberately slow view
              CREATE OR REPLACE VIEW inventory_scan AS
              SELECT
                i.id, i.name, i.quantity, i.location, i.unit,
                pg_sleep(0) as scan_delay
              FROM inventory i;

