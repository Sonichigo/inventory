      runAlways: true
      comment: "50,000 random supplier rows — amplifies join cost with no indexes"
      changes:
        - sql:
            sql: |
              INSERT INTO suppliers (name, location, item, lead_days)
              SELECT
                (ARRAY['Pacific Meats Co','Cascade Farms','Texas Prime','Lone Star Supply',
