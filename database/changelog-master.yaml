# ── changelog-master.yaml ─────────────────────────────────────────────────────
# Single master changelog for BBQBookkeeper DBMarlin demo.
#
# Context tags:
#   "bad or good"  → runs in BOTH states (schema, locations)
#   "bad"          → runs only in bad state (drop indexes, bulk data)
#   "good"         → runs only in good state (add indexes, bulk data)
#
# Harness DB Instance context:
#   Bad pipeline  → context: bad
#   Good pipeline → context: good
#
# IMPORTANT: Every changeSet has an explicit context tag.
# Harness DB Ops skips changesets with no context when a context filter is applied.
#
# RESILIENCE DESIGN:
#   - All CREATE TABLE use IF NOT EXISTS → safe on fresh or existing DB
#   - All TRUNCATE wrapped in DO $$ blocks → safe if table doesn't exist
#   - All INSERT locations use ON CONFLICT DO NOTHING → safe if already seeded
#   - All DROP INDEX use IF EXISTS → safe on fresh DB
#   - seed changesets preceded by a locations existence check
#   - bulk inserts only run after seed inserts succeed (sequential changeset order)
#
# VISUAL DIFFERENCE DESIGN:
#   Bad state:  200,000 rows (inventory) + 100,000 rows (suppliers), no indexes
#               + pg_sleep(0.01) injected via trigger to amplify wait time
#               + intentional cross-join on suppliers for max scan cost
#   Good state: same row counts, 3 functional indexes, trigger removed

databaseChangeLog:

  # ════════════════════════════════════════════════════════════════════════════
  # SCHEMA — runs in both bad and good, idempotent
  # ════════════════════════════════════════════════════════════════════════════

  - changeSet:
      id: schema-1-create-locations
      author: bbqbookkeeper
      context: "bad or good"
      runOnChange: false
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS locations (
                id   SERIAL PRIMARY KEY,
                name TEXT NOT NULL UNIQUE,
                city TEXT NOT NULL
              );

  - changeSet:
      id: schema-2-create-inventory
      author: bbqbookkeeper
      context: "bad or good"
      runOnChange: false
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS inventory (
                id       SERIAL PRIMARY KEY,
                name     TEXT    NOT NULL,
                quantity INTEGER NOT NULL DEFAULT 0,
                unit     TEXT    NOT NULL DEFAULT 'lbs',
                location TEXT    NOT NULL REFERENCES locations(name) ON UPDATE CASCADE
              );

  - changeSet:
      id: schema-3-create-suppliers
      author: bbqbookkeeper
      context: "bad or good"
      runOnChange: false
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS suppliers (
                id        SERIAL PRIMARY KEY,
                name      TEXT    NOT NULL,
                location  TEXT    NOT NULL,
                item      TEXT    NOT NULL,
                lead_days INTEGER NOT NULL DEFAULT 1
              );

  # ════════════════════════════════════════════════════════════════════════════
  # TRUNCATE — runs always, safe on both fresh and existing DB
  # Uses DO $$ block so TRUNCATE is skipped gracefully if table doesn't exist
  # Fix #1: checks both inventory AND suppliers before truncating
  # Fix #7: guarantees clean slate before every bulk insert
  # ════════════════════════════════════════════════════════════════════════════

  - changeSet:
      id: state-1-truncate
      author: bbqbookkeeper
      context: "bad or good"
      runAlways: true
      changes:
        - sql:
            sql: |
              DO $$
              BEGIN
                IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'inventory') THEN
                  TRUNCATE TABLE inventory;
                END IF;
                IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'suppliers') THEN
                  TRUNCATE TABLE suppliers;
                END IF;
                IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'locations') THEN
                  TRUNCATE TABLE locations CASCADE;
                END IF;
              END $$;

  # ════════════════════════════════════════════════════════════════════════════
  # RESEED LOCATIONS — runs always
  # Fix #3: ON CONFLICT DO NOTHING prevents unique violation if truncate was skipped
  # Fix #2: locations always seeded before inventory FK inserts
  # ════════════════════════════════════════════════════════════════════════════

  - changeSet:
      id: state-2-reseed-locations
      author: bbqbookkeeper
      context: "bad or good"
      runAlways: true
      changes:
        - sql:
            sql: |
              INSERT INTO locations (name, city) VALUES
                ('Seattle','Seattle'),
                ('Portland','Portland'),
                ('San Francisco','San Francisco'),
                ('Austin','Austin'),
                ('Nashville','Nashville'),
                ('Chicago','Chicago'),
                ('Dallas','Dallas'),
                ('Miami','Miami'),
                ('Denver','Denver'),
                ('Phoenix','Phoenix')
              ON CONFLICT (name) DO NOTHING;

  # ════════════════════════════════════════════════════════════════════════════
  # DROP CONSTRAINTS — runs always, safe with IF EXISTS
  # ════════════════════════════════════════════════════════════════════════════

  - changeSet:
      id: state-3-drop-constraints
      author: bbqbookkeeper
      context: "bad or good"
      runAlways: true
      changes:
        - sql:
            sql: |
              ALTER TABLE inventory DROP CONSTRAINT IF EXISTS inventory_name_location_key;
              ALTER TABLE suppliers DROP CONSTRAINT IF EXISTS suppliers_name_location_key;

  # ════════════════════════════════════════════════════════════════════════════
  # BAD STATE
  # Visual amplification:
  #   - 200,000 inventory rows (4x more than before)
  #   - 100,000 supplier rows (2x more than before)
  #   - pg_sleep trigger on inventory SELECT to amplify wait time in DBMarlin
  #   - No indexes on any join column
  # ════════════════════════════════════════════════════════════════════════════

  - changeSet:
      id: bad-1-drop-indexes-and-set-trigger
      author: bbqbookkeeper
      context: "bad"
      runAlways: true
      comment: "BAD: drop all indexes + install sleep trigger for visible wait time"
      changes:
        - sql:
            sql: |
              -- Drop all functional indexes
              DROP INDEX IF EXISTS idx_inventory_location_lower;
              DROP INDEX IF EXISTS idx_suppliers_location_lower;
              DROP INDEX IF EXISTS idx_suppliers_item_lower;

              -- Drop good-state trigger if exists
              DROP TRIGGER IF EXISTS trg_inventory_scan_cost ON inventory;
              DROP FUNCTION IF EXISTS fn_inventory_scan_cost();

              -- Install a per-row sleep trigger to amplify sequential scan cost
              -- Each row scanned adds 0.5ms wait — at 5000 rows per query = 2.5s per query
              -- Clearly visible in DBMarlin wait events as ClientRead waits
              CREATE OR REPLACE FUNCTION fn_inventory_scan_cost()
              RETURNS TRIGGER LANGUAGE plpgsql AS $$
              BEGIN
                PERFORM pg_sleep(0.0005);
                RETURN NEW;
              END $$;

              CREATE TRIGGER trg_inventory_scan_cost
              BEFORE INSERT ON inventory
              FOR EACH ROW EXECUTE FUNCTION fn_inventory_scan_cost();

