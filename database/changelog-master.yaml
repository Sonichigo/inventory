# Single master changelog for BBQBookkeeper DBMarlin demo.
#
# Context tags:
#   "bad or good"  → runs in BOTH states (schema, locations)
#   "bad"          → runs only in bad state (drop indexes, bulk data)
#   "good"         → runs only in good state (add indexes, bulk data)
#
# Harness DB Instance context:
#   Bad pipeline  → context: bad
#   Good pipeline → context: good
#
# IMPORTANT: Every changeSet has an explicit context — no untagged changeSets.
# Harness skips changeSets with no context when a context filter is applied.

databaseChangeLog:

  # ── Schema — runs in both bad and good ──────────────────────────────────────

  - changeSet:
      id: schema-1-create-locations
      author: bbqbookkeeper
      context: "bad or good"
      runOnChange: false
      changes:
        - createTable:
            tableName: locations
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: TEXT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: city
                  type: TEXT
                  constraints:
                    nullable: false

  - changeSet:
      id: schema-2-create-inventory
      author: bbqbookkeeper
      context: "bad or good"
      runOnChange: false
      changes:
        - createTable:
            tableName: inventory
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: unit
                  type: TEXT
                  defaultValue: lbs
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: TEXT
                  constraints:
                    nullable: false
                    references: locations(name)
                    foreignKeyName: fk_inventory_location

  - changeSet:
      id: schema-3-create-suppliers
      author: bbqbookkeeper
      context: "bad or good"
      runOnChange: false
      changes:
        - createTable:
            tableName: suppliers
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: item
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: lead_days
                  type: INTEGER
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false

  # ── Truncate — runs in both, always ─────────────────────────────────────────

  - changeSet:
      id: state-1-truncate
      author: bbqbookkeeper
      context: "bad or good"
      runAlways: true
      changes:
        - sql:
            sql: |
              TRUNCATE TABLE inventory;
              TRUNCATE TABLE suppliers;
              TRUNCATE TABLE locations CASCADE;

  - changeSet:
      id: state-2-reseed-locations
      author: bbqbookkeeper
      context: "bad or good"
      runAlways: true
      changes:
        - sql:
            sql: |
              INSERT INTO locations (name, city) VALUES
                ('Seattle','Seattle'),('Portland','Portland'),
                ('San Francisco','San Francisco'),('Austin','Austin'),
                ('Nashville','Nashville'),('Chicago','Chicago'),
                ('Dallas','Dallas'),('Miami','Miami'),
                ('Denver','Denver'),('Phoenix','Phoenix');

  - changeSet:
      id: state-3-drop-constraints
      author: bbqbookkeeper
      context: "bad or good"
      runAlways: true
      changes:
        - sql:
            sql: |
              ALTER TABLE inventory DROP CONSTRAINT IF EXISTS inventory_name_location_key;
              ALTER TABLE suppliers DROP CONSTRAINT IF EXISTS suppliers_name_location_key;

  # ── BAD state — drop all indexes ────────────────────────────────────────────

  - changeSet:
      id: bad-1-drop-indexes
      author: bbqbookkeeper
      context: "bad"
      runAlways: true
      comment: "BAD: no indexes — LOWER() join on both tables forces sequential scans"
      changes:
        - sql:
            sql: |
              DROP INDEX IF EXISTS idx_inventory_location_lower;
              DROP INDEX IF EXISTS idx_suppliers_location_lower;
              DROP INDEX IF EXISTS idx_suppliers_item_lower;

