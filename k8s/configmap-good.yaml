# ── ConfigMap: GOOD performance state (the fix) ───────────────────────────────
# Functional index added — index scan replaces sequential scan
# Apply: kubectl apply -f k8s/configmap-good.yaml
#        kubectl rollout restart deployment/bbqbookeeper-web -n default
apiVersion: v1
kind: ConfigMap
metadata:
  name: bbq-sql
  namespace: default
data:
  schema.sql: |
    -- ── schema.sql ────────────────────────────────────────────────────────────────
    -- Creates tables only. Safe to run against both fresh and existing databases.
    -- NO unique constraint here — owned by seed.sql to handle schema drift.
    
    CREATE TABLE IF NOT EXISTS locations (
        id   SERIAL PRIMARY KEY,
        name TEXT NOT NULL UNIQUE,
        city TEXT NOT NULL
    );
    
    CREATE TABLE IF NOT EXISTS inventory (
        id       SERIAL PRIMARY KEY,
        name     TEXT    NOT NULL,
        quantity INTEGER NOT NULL DEFAULT 0,
        unit     TEXT    NOT NULL DEFAULT 'lbs',
        location TEXT    NOT NULL REFERENCES locations(name) ON UPDATE CASCADE
    );
    
    INSERT INTO locations (name, city) VALUES
        ('Seattle',       'Seattle'),
        ('Portland',      'Portland'),
        ('San Francisco', 'San Francisco'),
        ('Austin',        'Austin'),
        ('Nashville',     'Nashville'),
        ('Chicago',       'Chicago'),
        ('Dallas',        'Dallas'),
        ('Miami',         'Miami'),
        ('Denver',        'Denver'),
        ('Phoenix',       'Phoenix')
    ON CONFLICT (name) DO NOTHING;

  seed-good.sql: |
    -- ── seed-good.sql ─────────────────────────────────────────────────────────────
    -- GOOD performance state — the fix for DBMarlin demo.
    -- Order of operations:
    --   1. Truncate tables (clean slate — prevents duplicate constraint errors)
    --   2. Re-seed locations
    --   3. Drop/re-add unique constraint
    --   4. Add functional index on LOWER(location) — this is the fix
    --   5. Insert inventory (index scan replaces sequential scan)
    
    TRUNCATE TABLE inventory;
    TRUNCATE TABLE locations CASCADE;
    
    INSERT INTO locations (name, city) VALUES
        ('Seattle','Seattle'),('Portland','Portland'),
        ('San Francisco','San Francisco'),('Austin','Austin'),
        ('Nashville','Nashville'),('Chicago','Chicago'),
        ('Dallas','Dallas'),('Miami','Miami'),
        ('Denver','Denver'),('Phoenix','Phoenix');
    
    ALTER TABLE inventory DROP CONSTRAINT IF EXISTS inventory_name_location_key;
    ALTER TABLE inventory ADD CONSTRAINT inventory_name_location_key UNIQUE (name, location);
    
    -- THE FIX: functional index matches LOWER(location) = LOWER($1) query pattern
    DROP INDEX IF EXISTS idx_inventory_location_lower;
    CREATE INDEX idx_inventory_location_lower ON inventory (LOWER(location));
    
