---
apiVersion: v1
kind: Secret
metadata:
  name: bbq-db-secret
  namespace: default
type: Opaque
stringData:
  db-init-user: "user"
  db-init-pass: "password"
  db-user:      "user"
  db-password:  "password"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bbqbookeeper-web
  namespace: default
  labels:
    app: bbqinventoryapp
spec:
  replicas: 3
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: bbqinventoryapp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: bbqinventoryapp
    spec:
      containers:
      # ── load generator sidecar ───────────────────────────────────────────
      - name: load-generator
        image: curlimages/curl:7.85.0
        command: ["/bin/sh", "-c"]
        args:
          - |
            while true; do
              curl -s localhost:8080/inventory-by-location?location=Seattle > /dev/null
              sleep 0.05
            done
        resources:
          requests:
            cpu: "25m"
            memory: "32Mi"
          limits:
            cpu: "50m"
            memory: "64Mi"

      # ── main app ─────────────────────────────────────────────────────────
      - name: bbqinventoryapp
        image: ghcr.io/sonichigo/bbqbookkeeper:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: DB_SERVER
          value: "postgres-dbops"
        - name: SQL_DIR
          value: "/etc/bbq-sql"          # mounted from ConfigMap
        - name: DB_INIT_USER
          valueFrom:
            secretKeyRef:
              name: bbq-db-secret
              key: db-init-user
        - name: DB_INIT_PASS
          valueFrom:
            secretKeyRef:
              name: bbq-db-secret
              key: db-init-pass
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: bbq-db-secret
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bbq-db-secret
              key: db-password
        volumeMounts:
        - name: sql-config
          mountPath: /etc/bbq-sql        # schema.sql + seed.sql land here
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 3
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "150m"
            memory: "128Mi"

      volumes:
      - name: sql-config
        configMap:
          name: bbq-sql                  # swap configmap-bad ↔ configmap-good

      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: bbqbookkeeper-web
  namespace: default
  labels:
    app: bbqinventoryapp
spec:
  type: LoadBalancer
  selector:
    app: bbqinventoryapp
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30002